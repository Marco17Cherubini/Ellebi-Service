<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione VIP - Ellebi Service SRL</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/styles/pages/vip.css">
</head>

<body>
    <div class="header">
        <img src="/images/LB-Service-Logo.webp" alt="LB Service" class="header-logo">
        <button type="button" id="logout-btn" class="btn header-btn">Logout</button>
    </div>

    <div class="container">
        <a href="/admin" class="back-link">Torna al Pannello Admin</a>

        <h2 class="page-title">Gestione Clienti VIP</h2>
        <p class="page-subtitle">Seleziona i clienti che potranno vedere gli orari straordinari</p>

        <div class="vip-container">
            <div class="search-box">
                <input type="text" id="search-input" class="search-input" placeholder="Cerca per nome o cognome...">
            </div>

            <div id="users-count" class="users-count"></div>

            <div id="users-list" class="users-list">
                <div class="no-users">Caricamento...</div>
            </div>
        </div>
    </div>

    <!-- Barra conferma modifiche -->
    <div id="confirm-bar" class="confirm-bar">
        <div class="changes-info">
            <span id="changes-count">0 modifiche</span> in attesa di conferma
        </div>
        <div>
            <button type="button" id="cancel-changes-btn" class="btn-cancel">Annulla</button>
            <button type="button" id="confirm-changes-btn" class="btn-confirm">Conferma</button>
        </div>
    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/vip.js"></script>
</body>

</html>
