<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resoconto Clientela - Ellebi Service SRL</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/styles/pages/admin-reports.css">
</head>

<body>
    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Sidebar Menu -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <a href="/admin" class="sidebar-logo-link">
                <img src="/images/LB-Service-Logo.webp" alt="LB Service" class="sidebar-logo">
            </a>
            <button type="button" id="close-sidebar" class="sidebar-close">&times;</button>
        </div>
        <nav class="sidebar-nav">
            <a href="/admin" class="sidebar-item">
                <span>Calendario Appuntamenti</span>
            </a>
            <a href="/admin/reports" class="sidebar-item active">
                <span>Resoconto Clientela</span>
            </a>
            <a href="/admin/clienti" class="sidebar-item">
                <span>Gestione Clienti</span>
            </a>
            <a href="/admin/depositi" class="sidebar-item">
                <span>Lavori Straordinari</span>
            </a>
            <a href="/admin/listino" class="sidebar-item">
                <span>Listino Servizi</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button type="button" id="sidebar-logout" class="sidebar-item sidebar-logout">
                <span>Logout</span>
            </button>
        </div>
    </div>

    <div class="header">
        <div class="header-left">
            <button type="button" id="hamburger-btn" class="hamburger-btn" aria-label="Apri menu">☰</button>
            <a href="/admin" class="header-logo-link">
                <img src="/images/LB-Service-Logo.webp" alt="LB Service" class="header-logo">
            </a>
        </div>
    </div>

    <div class="container">
        <h2 class="page-title">Resoconto Clientela</h2>
        <p class="page-subtitle">Statistiche prenotazioni ed interventi effettuati</p>

        <div class="reports-container">
            <div class="filter-container">
                <label for="period-filter" class="filter-label">Periodo:</label>
                <select id="period-filter" class="filter-select">
                    <option value="weekly">Settimana</option>
                    <option value="monthly">Mese</option>
                </select>
            </div>

            <div class="chart-container">
                <canvas id="bookings-chart"></canvas>
            </div>

            <div class="stats-summary">
                <div class="stat-card">
                    <div id="total-bookings" class="stat-value">0</div>
                    <div class="stat-label">Totale Interventi</div>
                </div>
                <div class="stat-card">
                    <div id="avg-bookings" class="stat-value">0</div>
                    <div class="stat-label">Media Giornaliera</div>
                </div>
                <div class="stat-card">
                    <div id="max-bookings" class="stat-value">0</div>
                    <div class="stat-label">Giorno Migliore</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/admin-reports.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>

</html>
