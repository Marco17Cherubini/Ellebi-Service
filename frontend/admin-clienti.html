<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Clienti - Ellebi Service SRL</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/styles/pages/admin-clienti.css">
</head>

<body>
    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Sidebar Menu -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <a href="/admin" class="sidebar-logo-link">
                <img src="/images/LB-Service-Logo.webp" alt="LB Service" class="sidebar-logo">
            </a>
            <button type="button" id="close-sidebar" class="sidebar-close">&times;</button>
        </div>
        <nav class="sidebar-nav">
            <a href="/admin" class="sidebar-item">
                <span>Calendario Appuntamenti</span>
            </a>
            <a href="/admin/reports" class="sidebar-item">
                <span>Resoconto Clientela</span>
            </a>
            <a href="/admin/clienti" class="sidebar-item active">
                <span>Gestione Clienti</span>
            </a>
            <a href="/admin/depositi" class="sidebar-item">
                <span>Lavori Straordinari</span>
            </a>
            <a href="/admin/listino" class="sidebar-item">
                <span>Listino Servizi</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button type="button" id="sidebar-logout" class="sidebar-item sidebar-logout">
                <span>Logout</span>
            </button>
        </div>
    </div>

    <div class="header">
        <div class="header-left">
            <button type="button" id="hamburger-btn" class="hamburger-btn" aria-label="Apri menu">☰</button>
            <a href="/admin" class="header-logo-link">
                <img src="/images/LB-Service-Logo.webp" alt="LB Service" class="header-logo">
            </a>
        </div>
    </div>

    <div class="container">
        <h2 class="page-title">Gestione Clienti</h2>
        <p class="page-subtitle">Gestisci lo stato VIP e BAN dei clienti</p>

        <div class="clienti-container">
            <div class="search-box">
                <input type="text" id="search-input" class="search-input" placeholder="Cerca per nome o cognome...">
            </div>

            <div id="users-count" class="users-count"></div>

            <div id="users-list" class="users-list">
                <div class="no-users">Caricamento...</div>
            </div>
        </div>
    </div>

    <!-- Barra conferma modifiche -->
    <div id="confirm-bar" class="confirm-bar">
        <div class="changes-info">
            <span id="changes-count">0 modifiche</span> in attesa di conferma
        </div>
        <div>
            <button type="button" id="cancel-changes-btn" class="btn-cancel">Annulla</button>
            <button type="button" id="confirm-changes-btn" class="btn-confirm">Conferma</button>
        </div>
    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/admin-clienti.js"></script>
</body>

</html>
